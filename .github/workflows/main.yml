name: Check Room Availability

on:
  # ⚠️ Schedule temporarily disabled — detection logic gave a false
  # positive and is being rebuilt to check specific date columns
  # instead of "any price/checkmark on the page". Re-enable the
  # `schedule:` block below once verified.
   schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: 1
        run: npm run check

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug-screenshot.png
            debug-page-text.txt
            debug-availability.json
          retention-days: 3
          if-no-files-found: ignore
